name: Lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned Attic client; see build.yml for the pin-bump policy.
  ATTIC_CLIENT_PIN: 828b7ba583afae9523cda1c66d466ea430ea0160
  ATTIC_SUBSTITUTER: https://attic.jeiang.dev/default
  ATTIC_PUBLIC_KEY: "default:Xaqeg5b1ctNwH4sEWG+nt1kSpGPpFG0zivJUbZyCfdM="

jobs:
  lint:
    name: Lint

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7.0.0

      - name: Install current Bash on macOS
        if: runner.os == 'macOS'
        run: |
          command -v brew && brew install bash || true

      - uses: DeterminateSystems/nix-installer-action@v22
        continue-on-error: true # Self-hosted runners already have Nix installed

      - name: Install Attic
        run: |
          if ! command -v attic &> /dev/null; then
            nix profile install \
              --extra-substituters "$ATTIC_SUBSTITUTER" \
              --extra-trusted-public-keys "$ATTIC_PUBLIC_KEY" \
              "github:jeiang/attic/${ATTIC_CLIENT_PIN}#attic-client"
          fi

      - name: Configure Attic (pull-only)
        continue-on-error: true
        run: ./.ci/configure-attic.sh
        env:
          ATTIC_SERVER: ${{ secrets.ATTIC_SERVER }}
          ATTIC_CACHE: ${{ secrets.ATTIC_CACHE }}

      - name: Cache dev shell
        run: |
          .ci/cache-shell.sh
          system=$(nix-instantiate --eval -E 'builtins.currentSystem')
          echo system=$system >>$GITHUB_ENV

      - name: Check rustfmt
        run: .ci/run just ci-rustfmt
